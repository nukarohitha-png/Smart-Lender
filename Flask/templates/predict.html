<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Lender - Enter Details</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="navbar">Smart Lender</div>
  <div class="container">
    <h3>Enter your Details for Loan Approval Prediction</h3>
    <form action="{{ url_for('output') }}" method="POST">
      <div class="grid-2">
        <div>
          <label for="gender">Gender</label>
          <select name="gender" id="gender" required>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
          </select>
        </div>
        <div>
          <label for="married">Married</label>
          <select name="married" id="married" required>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
          </select>
        </div>
        <div>
          <label for="dependents">Dependents</label>
          <select name="dependents" id="dependents" required>
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3+">3+</option>
          </select>
        </div>
        <div>
          <label for="education">Education</label>
          <select name="education" id="education" required>
            <option value="Graduate">Graduate</option>
            <option value="Not Graduate">Not Graduate</option>
          </select>
        </div>
        <div>
          <label for="self_employed">Self Employed</label>
          <select name="self_employed" id="self_employed" required>
            <option value="No">No</option>
            <option value="Yes">Yes</option>
          </select>
        </div>
        <div>
          <label for="property_area">Property Area</label>
          <select name="property_area" id="property_area" required>
            <option value="Urban">Urban</option>
            <option value="Semiurban">Semiurban</option>
            <option value="Rural">Rural</option>
          </select>
        </div>
        <div>
          <label for="applicant_income">Applicant Income</label>
          <input type="number" step="any" name="applicant_income" id="applicant_income" required>
        </div>
        <div>
          <label for="coapplicant_income">Coapplicant Income</label>
          <input type="number" step="any" name="coapplicant_income" id="coapplicant_income" required>
        </div>
        <div>
          <label for="loan_amount">Loan Amount (in thousands)</label>
          <input type="number" step="any" name="loan_amount" id="loan_amount" required>
        </div>
        <div>
          <label for="loan_amount_term">Loan Amount Term (days)</label>
          <input type="number" step="any" name="loan_amount_term" id="loan_amount_term" required>
        </div>
        <div>
          <label for="credit_history">Credit History</label>
          <select name="credit_history" id="credit_history" required>
            <option value="1">Good (1)</option>
            <option value="0">Bad (0)</option>
          </select>
        </div>
      </div>
      <button class="btn" type="submit">Predict</button>
    </form>
  </div>
</body>
</html>
